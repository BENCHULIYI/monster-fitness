<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Black background -->
  <rect width="512" height="512" rx="80" fill="#0a0a0a"/>
  
  <!-- Subtle texture dots -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="512" height="512" rx="80" filter="url(#noise)" opacity="0.08"/>
  
  <!-- Outer green glow ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#00ff6a" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="218" fill="none" stroke="#00ff6a" stroke-width="1.5" opacity="0.2"/>
  
  <!-- Godzilla / Monster silhouette - stylized -->
  <!-- Dorsal fins (back spines) -->
  <g fill="#00ff6a" opacity="0.9">
    <polygon points="256,60 246,110 266,110"/>   <!-- fin 1 -->
    <polygon points="256,75 238,125 274,125"/>   <!-- fin 2 -->
    <polygon points="256,95 230,145 282,145"/>   <!-- fin 3 -->
    <polygon points="256,120 222,168 290,168"/>  <!-- fin 4 -->
    <polygon points="256,150 214,195 298,195"/>  <!-- fin 5 -->
  </g>
  
  <!-- Head -->
  <ellipse cx="256" cy="230" rx="52" ry="65" fill="#0a0a0a" stroke="#00ff6a" stroke-width="3"/>
  
  <!-- Jaw / mouth glow -->
  <path d="M 225 255 Q 256 275 287 255" fill="none" stroke="#00ff6a" stroke-width="3" opacity="0.8"/>
  <path d="M 235 250 L 256 272 L 277 250" fill="none" stroke="#00ff6a" stroke-width="2" opacity="0.5"/>
  
  <!-- Eyes - glowing green -->
  <circle cx="238" cy="218" r="12" fill="#00ff6a" opacity="1"/>
  <circle cx="274" cy="218" r="12" fill="#00ff6a" opacity="1"/>
  <!-- Eye glow halo -->
  <circle cx="238" cy="218" r="22" fill="none" stroke="#00ff6a" stroke-width="2" opacity="0.3"/>
  <circle cx="274" cy="218" r="22" fill="none" stroke="#00ff6a" stroke-width="2" opacity="0.3"/>
  
  <!-- Teeth hints -->
  <g stroke="#00ff6a" stroke-width="2" opacity="0.5">
    <line x1="242" y1="258" x2="242" y2="268"/>
    <line x1="250" y1="260" x2="250" y2="272"/>
    <line x1="258" y1="258" x2="258" y2="270"/>
    <line x1="266" y1="260" x2="266" y2="272"/>
    <line x1="274" y1="258" x2="274" y2="268"/>
  </g>
  
  <!-- Neck / Torso -->
  <path d="M 220 285 Q 200 320 210 370 Q 230 400 256 405 Q 282 400 302 370 Q 312 320 292 285"
        fill="#0a0a0a" stroke="#00ff6a" stroke-width="3" opacity="0.9"/>
  
  <!-- Chest muscle lines -->
  <path d="M 256 300 Q 240 330 238 365" fill="none" stroke="#00ff6a" stroke-width="1.5" opacity="0.4"/>
  <path d="M 256 300 Q 272 330 274 365" fill="none" stroke="#00ff6a" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Arms with claws -->
  <!-- Left arm -->
  <path d="M 215 310 Q 170 340 150 380" fill="none" stroke="#00ff6a" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
  <!-- Left claw -->
  <g stroke="#00ff6a" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <line x1="150" y1="380" x2="135" y2="405"/>
    <line x1="150" y1="380" x2="140" y2="410"/>
    <line x1="150" y1="380" x2="155" y2="412"/>
  </g>
  
  <!-- Right arm -->
  <path d="M 297 310 Q 342 340 362 380" fill="none" stroke="#00ff6a" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
  <!-- Right claw -->
  <g stroke="#00ff6a" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <line x1="362" y1="380" x2="377" y2="405"/>
    <line x1="362" y1="380" x2="372" y2="410"/>
    <line x1="362" y1="380" x2="357" y2="412"/>
  </g>
  
  <!-- "MONSTER" text arc at bottom -->
  <path id="textArc" d="M 130 450 Q 256 500 382 450" fill="none"/>
  <text font-family="Arial Black, Impact, sans-serif" font-size="36" font-weight="900" fill="#00ff6a" opacity="0.7">
    <textPath href="#textArc" startOffset="50%" text-anchor="middle">MONSTER</textPath>
  </text>
  
  <!-- Small claw slash marks bottom -->
  <g stroke="#00ff6a" stroke-width="3" opacity="0.5" stroke-linecap="round">
    <line x1="180" y1="470" x2="180" y2="500"/>
    <line x1="230" y1="470" x2="230" y2="500"/>
    <line x1="282" y1="470" x2="282" y2="500"/>
  </g>
  
  <!-- Green glow effect (outer) -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="#00ff6a" stroke-width="1" opacity="0.1"/>
</svg>
